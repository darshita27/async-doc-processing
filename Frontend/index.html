<!DOCTYPE html>
<html>
<head>
    <title>Document Processing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        input[type="file"] {
            padding: 6px;
            margin-right: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px 5px 5px 0;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        hr {
            margin: 25px 0;
            border: 0;
            border-top: 1px solid #ddd;
        }

        #docList {
            list-style: none;
            padding: 0;
        }

        #docList li {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        #docList li button {
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="container">
<h2>Upload Document</h2>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<hr>

<h2>Documents Dashboard</h2>
<button onclick="loadDocuments()">Refresh</button>

<ul id="docList"></ul>
</div>

<script>
const API = "https://async-doc-processing.onrender.com";

// Upload file
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    const formData = new FormData();
    formData.append("file", file);

    await fetch(API + "/upload/", {
        method: "POST",
        body: formData
    });

    alert("Uploaded!");
    loadDocuments();
}

// Load all documents
async function loadDocuments() {
    const res = await fetch(API + "/documents/");
    const data = await res.json();

    const list = document.getElementById("docList");
    list.innerHTML = "";

    data.forEach(doc => {
        const li = document.createElement("li");

        li.innerHTML = `
            ID: ${doc.id} | ${doc.name} | Status: ${doc.status}
            <button onclick="processDoc(${doc.id})">Process</button>
            <button onclick="viewDoc(${doc.id})">View</button>
        `;

        list.appendChild(li);
    });
}

// Process document
async function processDoc(id) {
    await fetch(API + "/process/" + id, { method: "POST" });
    alert("Processing started");
}

// View document
async function viewDoc(id) {
    const res = await fetch(API + "/documents/" + id);
    const doc = await res.json();

    alert(
        "Name: " + doc.name +
        "\nStatus: " + doc.status +
        "\nResult: " + doc.result
    );
}

// Load on start
loadDocuments();
</script>

</body>
</html>
